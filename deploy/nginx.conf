server {
    listen 3100;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
